<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horizon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="hero">
    <svg class="stars" viewBox="0 0 1200 320" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <circle cx="55" cy="50" r="1.6" fill="#F3EDF7" opacity="0.7"/>
      <circle cx="120" cy="110" r="1" fill="#F3EDF7" opacity="0.4"/>
      <circle cx="90" cy="190" r="1.3" fill="#F3EDF7" opacity="0.55"/>
      <circle cx="180" cy="60" r="1" fill="#F3EDF7" opacity="0.5"/>
      <circle cx="210" cy="150" r="1.6" fill="#F3EDF7" opacity="0.65"/>
      <circle cx="35" cy="230" r="1" fill="#F3EDF7" opacity="0.4"/>
      <circle cx="270" cy="95" r="1.2" fill="#F3EDF7" opacity="0.5"/>
      <circle cx="150" cy="260" r="1.4" fill="#F3EDF7" opacity="0.55"/>
      <circle cx="310" cy="180" r="1" fill="#F3EDF7" opacity="0.4"/>
      <circle cx="1145" cy="55" r="1.6" fill="#F3EDF7" opacity="0.7"/>
      <circle cx="1080" cy="115" r="1" fill="#F3EDF7" opacity="0.4"/>
      <circle cx="1110" cy="195" r="1.3" fill="#F3EDF7" opacity="0.55"/>
      <circle cx="1020" cy="65" r="1" fill="#F3EDF7" opacity="0.5"/>
      <circle cx="990" cy="155" r="1.6" fill="#F3EDF7" opacity="0.65"/>
      <circle cx="1165" cy="235" r="1" fill="#F3EDF7" opacity="0.4"/>
      <circle cx="930" cy="100" r="1.2" fill="#F3EDF7" opacity="0.5"/>
      <circle cx="1050" cy="265" r="1.4" fill="#F3EDF7" opacity="0.55"/>
      <circle cx="895" cy="185" r="1" fill="#F3EDF7" opacity="0.4"/>
    </svg>

    <div class="glow" aria-hidden="true"></div>

    <svg class="sun-art" viewBox="0 0 400 180" aria-hidden="true">
      <defs>
        <filter id="soft-glow" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="7" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <clipPath id="stripes">
          <rect x="0" y="30" width="400" height="42"/>
          <rect x="0" y="88" width="400" height="34"/>
          <rect x="0" y="136" width="400" height="28"/>
          <rect x="0" y="172" width="400" height="8"/>
        </clipPath>
      </defs>
      <path d="M30,180 A170,170 0 0 1 370,180" fill="none" stroke="#FF7A33" stroke-width="1" opacity="0.3" filter="url(#soft-glow)"/>
      <path d="M50,180 A150,150 0 0 1 350,180 Z" fill="#FF7A33" clip-path="url(#stripes)" filter="url(#soft-glow)"/>
    </svg>

    <div class="hero-inner">
      <h1 class="wordmark">Horizon</h1>
    </div>

    <div class="divider" aria-hidden="true"></div>
  </header>

  <main>
    <section class="grid-section">
      <div class="grid-heading">
        <h2>Games</h2>
        <span class="count" id="game-count">0 live</span>
      </div>

      <div class="grid" id="grid">
        <!-- rendered by script.js -->
      </div>
    </section>

    <section class="empty-note">
      <p>Nothing's live yet &mdash; each tile below is a placeholder until a real game is linked to it.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
