<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horizon: Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<style>
  /* ---------- Chat page (page-specific, layered on top of style.css) ---------- */

  .chat-shell {
    max-width: 980px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 1.1rem;
    height: min(640px, 74vh);
    min-height: 420px;
  }

  .panel {
    background: var(--ground);
    border: 1px solid var(--line);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.1rem;
    border-bottom: 1px solid var(--line);
  }

  .sidebar-head h2 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1rem;
    margin: 0;
  }

  .icon-btn {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 1.1rem;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s ease, color 0.15s ease;
  }

  .icon-btn:hover { border-color: var(--orange); color: var(--orange); }

  .sidebar-tabs {
    display: flex;
    gap: 0.4rem;
    padding: 0.75rem 1.1rem 0;
  }

  .sidebar-tab {
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 0.78rem;
    color: var(--muted);
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 0.3rem 0.7rem;
    cursor: pointer;
  }

  .sidebar-tab.active {
    color: var(--sky-deep);
    background: var(--orange);
    border-color: var(--orange);
  }

  .convo-list {
    list-style: none;
    margin: 0;
    padding: 0.75rem 0.5rem;
    overflow-y: auto;
    flex: 1;
    scrollbar-width: thin;
    scrollbar-color: var(--line) transparent;
  }

  .convo-list::-webkit-scrollbar,
  .messages::-webkit-scrollbar { width: 8px; }
  .convo-list::-webkit-scrollbar-track,
  .messages::-webkit-scrollbar-track { background: transparent; }
  .convo-list::-webkit-scrollbar-thumb,
  .messages::-webkit-scrollbar-thumb {
    background: var(--line);
    border-radius: 8px;
    border: 2px solid var(--ground);
  }
  .convo-list::-webkit-scrollbar-thumb:hover,
  .messages::-webkit-scrollbar-thumb:hover { background: var(--orange); }

  .convo-item {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    width: 100%;
    padding: 0.6rem 0.6rem;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: var(--text);
    text-align: left;
    cursor: pointer;
    font-family: var(--font-body);
  }

  .convo-item:hover { background: rgba(255, 122, 51, 0.08); }
  .convo-item.active { background: rgba(255, 122, 51, 0.16); }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--sky-deep);
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--orange);
    flex-shrink: 0;
    position: relative;
  }

  .avatar.online::after {
    content: "";
    position: absolute;
    bottom: -1px;
    right: -1px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #4ADE80;
    border: 2px solid var(--ground);
  }

  .convo-meta { min-width: 0; }
  .convo-name { font-size: 0.88rem; font-weight: 500; }
  .convo-preview {
    font-size: 0.76rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 160px;
  }

  .empty-list-note {
    color: var(--muted);
    font-size: 0.82rem;
    padding: 1rem 0.6rem;
    text-align: center;
  }

  /* Chat window */
  .chat-window { position: relative; }

  .chat-head {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    padding: 1rem 1.1rem;
    border-bottom: 1px solid var(--line);
  }

  .chat-head-name { font-family: var(--font-display); font-weight: 600; font-size: 0.98rem; }
  .chat-head-sub { font-size: 0.76rem; color: var(--muted); }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.1rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    scrollbar-width: thin;
    scrollbar-color: var(--line) transparent;
  }

  .msg {
    max-width: 72%;
    padding: 0.55rem 0.8rem;
    border-radius: 12px;
    font-size: 0.88rem;
    line-height: 1.4;
  }

  .msg-them {
    align-self: flex-start;
    background: var(--sky-deep);
    border: 1px solid var(--line);
    border-bottom-left-radius: 3px;
  }

  .msg-me {
    align-self: flex-end;
    background: var(--orange);
    color: var(--sky-deep);
    border-bottom-right-radius: 3px;
  }

  .msg-sender {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--orange);
    margin-bottom: 0.15rem;
  }

  .msg-me .msg-sender { display: none; }

  .composer {
    display: flex;
    gap: 0.6rem;
    padding: 0.85rem 1.1rem;
    border-top: 1px solid var(--line);
  }

  .composer input {
    flex: 1;
    background: var(--sky-deep);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 0.6rem 0.85rem;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.88rem;
  }

  .composer input:focus { outline: none; border-color: var(--orange); }

  .send-btn {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--sky-deep);
    background: var(--orange);
    border: none;
    border-radius: 8px;
    padding: 0 1.1rem;
    cursor: pointer;
  }

  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .chat-window-empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.9rem;
    text-align: center;
    padding: 2rem;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(19, 15, 40, 0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 20;
    padding: 1.5rem;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--ground);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 1.5rem;
    width: 100%;
    max-width: 360px;
  }

  .modal h3 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1.05rem;
    margin: 0 0 0.9rem;
  }

  .modal label {
    display: block;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 0.35rem;
  }

  .modal input {
    width: 100%;
    background: var(--sky-deep);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 0.6rem 0.75rem;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.88rem;
    margin-bottom: 0.6rem;
  }

  .modal input:focus { outline: none; border-color: var(--orange); }

  .modal-checklist {
    max-height: 160px;
    overflow-y: auto;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 0.4rem;
    margin-bottom: 0.9rem;
    scrollbar-width: thin;
    scrollbar-color: var(--line) transparent;
  }

  .modal-checklist::-webkit-scrollbar { width: 8px; }
  .modal-checklist::-webkit-scrollbar-track { background: transparent; }
  .modal-checklist::-webkit-scrollbar-thumb {
    background: var(--line);
    border-radius: 8px;
    border: 2px solid var(--ground);
  }
  .modal-checklist::-webkit-scrollbar-thumb:hover { background: var(--orange); }

  .modal-check-row {
    display: flex !important;
    align-items: center;
    gap: 0.6rem;
    padding: 0.5rem 0.4rem;
    font-size: 0.85rem;
    border-radius: 6px;
    cursor: pointer;
  }

  .modal-check-row:hover { background: rgba(255, 122, 51, 0.08); }

  .check-input {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
  }

  .check-box {
    width: 18px;
    height: 18px;
    border-radius: 5px;
    border: 1px solid var(--line);
    background: var(--sky-deep);
    flex-shrink: 0;
    position: relative;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  .check-input:checked + .check-box {
    background: var(--orange);
    border-color: var(--orange);
  }

  .check-input:checked + .check-box::after {
    content: "";
    position: absolute;
    left: 5px;
    top: 1px;
    width: 5px;
    height: 9px;
    border: solid var(--sky-deep);
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  .check-input:focus-visible + .check-box {
    outline: 2px solid var(--orange);
    outline-offset: 2px;
  }

  .check-name { font-size: 0.85rem; }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.6rem;
    margin-top: 0.4rem;
  }

  .btn-ghost {
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 0.85rem;
    color: var(--muted);
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 0.5rem 0.9rem;
    cursor: pointer;
  }

  .btn-primary {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--sky-deep);
    background: var(--orange);
    border: none;
    border-radius: 8px;
    padding: 0.5rem 0.9rem;
    cursor: pointer;
  }

  .modal-note {
    font-size: 0.76rem;
    color: var(--muted);
    margin-top: 0.7rem;
  }

  @media (max-width: 720px) {
    .chat-shell {
      grid-template-columns: 1fr;
      height: auto;
    }
    .panel { height: 380px; }
  }

  /* Auth */
  .auth-shell {
    max-width: 380px;
    margin: 3rem auto;
    padding: 0 1.5rem 4rem;
  }

  .auth-panel { padding: 1.6rem; }

  .auth-panel h2 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1.2rem;
    margin: 0 0 1.1rem;
  }

  .auth-panel label {
    display: block;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 0.35rem;
  }

  .auth-panel input {
    width: 100%;
    background: var(--sky-deep);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 0.6rem 0.75rem;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.88rem;
    margin-bottom: 0.9rem;
  }

  .auth-panel input:focus { outline: none; border-color: var(--orange); }

  .link-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.78rem;
    font-family: var(--font-body);
    text-decoration: underline;
    cursor: pointer;
    padding: 0;
  }

  .link-btn:hover { color: var(--orange); }

  .auth-error {
    font-size: 0.8rem;
    color: #FF7A7A;
    margin-top: 0.8rem;
    min-height: 1em;
  }

  .signed-in-as {
    font-size: 0.72rem;
    color: var(--muted);
    padding: 0 0.15rem 0.6rem;
  }

  .signed-in-as button {
    background: none;
    border: none;
    color: var(--orange);
    font-size: 0.72rem;
    text-decoration: underline;
    cursor: pointer;
    font-family: var(--font-body);
    padding: 0;
  }
</style>
</head>
<body>
  <nav class="topnav">
    <div class="nav-left">
      <a href="../index.html" class="nav-brand">
        <span class="nav-emoji">🌅</span> Horizon
      </a>
      <a href="../othergames/index.html" class="nav-link">Other Games</a>
      <a href="index.html" class="nav-link nav-link-active">Chat</a>
    </div>
    <div class="nav-right">
      <a href="../info/index.html" class="nav-link">Info</a>
    </div>
  </nav>

  <header class="hero chat-hero">
    <svg class="stars" viewBox="0 0 1200 320" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <circle cx="55" cy="50" r="1.6" fill="#F3EDF7" opacity="0.7"/>
      <circle cx="120" cy="110" r="1" fill="#F3EDF7" opacity="0.4"/>
      <circle cx="1145" cy="55" r="1.6" fill="#F3EDF7" opacity="0.7"/>
      <circle cx="1080" cy="115" r="1" fill="#F3EDF7" opacity="0.4"/>
      <circle cx="990" cy="155" r="1.6" fill="#F3EDF7" opacity="0.65"/>
    </svg>
    <div class="glow" aria-hidden="true"></div>
    <svg class="sun-art" viewBox="0 0 400 180" aria-hidden="true">
      <defs>
        <filter id="soft-glow" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="7" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <clipPath id="stripes">
          <rect x="0" y="30" width="400" height="42"/>
          <rect x="0" y="88" width="400" height="34"/>
          <rect x="0" y="136" width="400" height="28"/>
          <rect x="0" y="172" width="400" height="8"/>
        </clipPath>
      </defs>
      <path d="M30,180 A170,170 0 0 1 370,180" fill="none" stroke="#FF7A33" stroke-width="1" opacity="0.3" filter="url(#soft-glow)"/>
      <path d="M50,180 A150,150 0 0 1 350,180 Z" fill="#FF7A33" clip-path="url(#stripes)" filter="url(#soft-glow)"/>
    </svg>
    <div class="hero-inner">
      <h1 class="wordmark">Horizon</h1>
    </div>
    <div class="divider" aria-hidden="true"></div>
  </header>

  <main>
    <!-- Auth gate -->
    <div class="auth-shell" id="authShell">
      <div class="panel auth-panel">
        <h2 id="authTitle">Log in</h2>
        <label for="authUsername">Username</label>
        <input type="text" id="authUsername" autocomplete="username">
        <label for="authPassword">Password</label>
        <input type="password" id="authPassword" autocomplete="current-password">
        <div class="modal-actions" style="justify-content:space-between; align-items:center;">
          <button class="link-btn" id="authToggle">Need an account? Sign up</button>
          <button class="btn-primary" id="authSubmit">Log in</button>
        </div>
        <p class="auth-error" id="authError"></p>
      </div>
    </div>

    <!-- Chat shell -->
    <div id="chatOuter" style="display:none;">
      <div class="signed-in-as">
        Signed in as <strong id="signedInName"></strong> · <button id="logoutBtn">Log out</button>
      </div>
      <div class="chat-shell">
        <!-- Sidebar: friends + conversations -->
        <div class="panel">
          <div class="sidebar-head">
            <h2>Friends</h2>
            <div style="display:flex; gap:0.4rem;">
              <button class="icon-btn" id="newGroupBtn" title="New group" style="font-size: 0.68rem; width: 38px;">+GC</button>
              <button class="icon-btn" id="addFriendBtn" title="Add friend">+</button>
            </div>
          </div>
          <div class="sidebar-tabs">
            <button class="sidebar-tab active" data-tab="all">All</button>
            <button class="sidebar-tab" data-tab="requests">Requests</button>
          </div>
          <ul class="convo-list" id="convoList"></ul>
        </div>

        <!-- Chat window -->
        <div class="panel chat-window">
          <div id="chatEmpty" class="chat-window-empty">
            Pick a friend or group on the left to start chatting.
          </div>
          <div id="chatActive" style="display:none; flex-direction:column; height:100%;">
            <div class="chat-head">
              <div class="avatar" id="chatAvatar"></div>
              <div>
                <div class="chat-head-name" id="chatName"></div>
                <div class="chat-head-sub" id="chatSub"></div>
              </div>
            </div>
            <div class="messages" id="messages"></div>
            <div class="composer">
              <input type="text" id="messageInput" placeholder="Message…" autocomplete="off">
              <button class="send-btn" id="sendBtn">Send</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Add friend modal -->
  <div class="modal-overlay" id="addFriendModal">
    <div class="modal">
      <h3>Add a friend</h3>
      <label for="friendCodeInput">Their username or friend code</label>
      <input type="text" id="friendCodeInput" placeholder="e.g. nova#4471">
      <div class="modal-actions">
        <button class="btn-ghost" data-close="addFriendModal">Cancel</button>
        <button class="btn-primary" id="sendRequestBtn">Send request</button>
      </div>
      <p class="modal-note">They'll show up under the Requests tab once they accept.</p>
    </div>
  </div>

  <!-- New group modal -->
  <div class="modal-overlay" id="newGroupModal">
    <div class="modal">
      <h3>New group</h3>
      <label for="groupNameInput">Group name</label>
      <input type="text" id="groupNameInput" placeholder="e.g. Weekend Crew">
      <label>Pick friends to add</label>
      <div class="modal-checklist" id="groupChecklist"></div>
      <div class="modal-actions">
        <button class="btn-ghost" data-close="newGroupModal">Cancel</button>
        <button class="btn-primary" id="createGroupBtn">Create group</button>
      </div>
    </div>
  </div>

  <script>
    // ---------------------------------------------------------------------
    // Set this to your deployed Worker URL (see horizon-chat-backend/README.md,
    // step 5). It'll look like https://horizon-chat.your-subdomain.workers.dev
    // ---------------------------------------------------------------------
    const API_BASE = 'https://horizon-chat.x67.workers.dev';

    const TOKEN_KEY = 'horizon-chat-token';
    let token = localStorage.getItem(TOKEN_KEY);
    let me = null;
    let authMode = 'login';
    let friends = [];
    let requests = [];
    let conversations = [];
    let activeConvoId = null;
    let activeTab = 'all';
    let socket = null;

    const authShell = document.getElementById('authShell');
    const chatOuter = document.getElementById('chatOuter');
    const convoList = document.getElementById('convoList');
    const chatEmpty = document.getElementById('chatEmpty');
    const chatActive = document.getElementById('chatActive');
    const messagesEl = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');

    async function api(path, options = {}) {
      const res = await fetch(API_BASE + path, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          ...(token ? { Authorization: `Bearer ${token}` } : {}),
          ...(options.headers || {})
        }
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || 'Something went wrong.');
      return data;
    }

    function initials(name) {
      return (name || '?').trim().slice(0, 2).toUpperCase();
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ---------- Auth ----------

    function showAuth() {
      authShell.style.display = 'block';
      chatOuter.style.display = 'none';
    }

    function showChat() {
      authShell.style.display = 'none';
      chatOuter.style.display = 'block';
      document.getElementById('signedInName').textContent = me.username;
    }

    document.getElementById('authToggle').addEventListener('click', () => {
      authMode = authMode === 'login' ? 'signup' : 'login';
      document.getElementById('authTitle').textContent = authMode === 'login' ? 'Log in' : 'Sign up';
      document.getElementById('authSubmit').textContent = authMode === 'login' ? 'Log in' : 'Sign up';
      document.getElementById('authToggle').textContent =
        authMode === 'login' ? 'Need an account? Sign up' : 'Already have one? Log in';
      document.getElementById('authError').textContent = '';
    });

    document.getElementById('authSubmit').addEventListener('click', submitAuth);
    document.getElementById('authPassword').addEventListener('keydown', (e) => { if (e.key === 'Enter') submitAuth(); });

    async function submitAuth() {
      const username = document.getElementById('authUsername').value.trim();
      const password = document.getElementById('authPassword').value;
      const errEl = document.getElementById('authError');
      errEl.textContent = '';
      if (!username || !password) { errEl.textContent = 'Fill in both fields.'; return; }

      try {
        const data = await api(authMode === 'login' ? '/api/login' : '/api/signup', {
          method: 'POST',
          body: JSON.stringify({ username, password })
        });
        token = data.token;
        localStorage.setItem(TOKEN_KEY, token);
        me = data.user;
        showChat();
        await loadEverything();
      } catch (err) {
        errEl.textContent = err.message;
      }
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
      token = null;
      me = null;
      localStorage.removeItem(TOKEN_KEY);
      if (socket) socket.close();
      showAuth();
    });

    // ---------- Loading data ----------

    async function loadEverything() {
      const [friendsData, convosData] = await Promise.all([
        api('/api/friends'),
        api('/api/conversations')
      ]);
      friends = friendsData.friends;
      requests = friendsData.requests;
      conversations = convosData.conversations;
      renderSidebar();
    }

    // ---------- Sidebar ----------

    function renderSidebar() {
      convoList.innerHTML = '';

      if (activeTab === 'requests') {
        if (requests.length === 0) {
          convoList.innerHTML = '<li class="empty-list-note">No pending requests.</li>';
          return;
        }
        requests.forEach(req => {
          const li = document.createElement('li');
          li.className = 'convo-item';
          li.innerHTML = `
            <div class="avatar">${initials(req.username)}</div>
            <div class="convo-meta" style="flex:1;">
              <div class="convo-name">${escapeHtml(req.username)}</div>
              <div class="convo-preview">wants to be friends</div>
            </div>`;
          const acceptBtn = document.createElement('button');
          acceptBtn.className = 'icon-btn';
          acceptBtn.textContent = '✓';
          acceptBtn.title = 'Accept';
          acceptBtn.onclick = (e) => { e.stopPropagation(); acceptRequest(req.request_id); };
          li.appendChild(acceptBtn);
          convoList.appendChild(li);
        });
        return;
      }

      if (conversations.length === 0) {
        convoList.innerHTML = '<li class="empty-list-note">No conversations yet. Add a friend to get started.</li>';
        return;
      }

      conversations.forEach(convo => {
        const last = convo.lastMessage;
        const li = document.createElement('li');
        li.className = 'convo-item' + (convo.id === activeConvoId ? ' active' : '');
        li.innerHTML = `
          <div class="avatar">${initials(convo.name)}</div>
          <div class="convo-meta">
            <div class="convo-name">${escapeHtml(convo.name)}${convo.type === 'group' ? ' · group' : ''}</div>
            <div class="convo-preview">${last ? (last.mine ? 'You: ' : '') + escapeHtml(last.content) : 'Say hi 👋'}</div>
          </div>`;
        li.onclick = () => openConversation(convo.id);
        convoList.appendChild(li);
      });
    }

    async function acceptRequest(requestId) {
      try {
        await api('/api/friends/accept', { method: 'POST', body: JSON.stringify({ requestId }) });
        activeTab = 'all';
        document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'all'));
        await loadEverything();
      } catch (err) {
        alert(err.message);
      }
    }

    document.querySelectorAll('.sidebar-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        activeTab = tab.dataset.tab;
        document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderSidebar();
      });
    });

    // ---------- Conversation + messages ----------

    async function openConversation(id) {
      activeConvoId = id;
      const convo = conversations.find(c => c.id === id);
      if (!convo) return;

      chatEmpty.style.display = 'none';
      chatActive.style.display = 'flex';

      document.getElementById('chatAvatar').textContent = initials(convo.name);
      document.getElementById('chatName').textContent = convo.name;
      document.getElementById('chatSub').textContent =
        convo.type === 'group' ? `${convo.members.length + 1} members` : '';

      renderSidebar();
      messagesEl.innerHTML = '';

      try {
        const history = await api(`/api/conversations/${id}/messages`);
        history.messages.forEach(m => appendMessageEl({
          sender: m.sender_id === me.id ? 'me' : m.sender_name,
          text: m.content
        }));
      } catch (err) {
        messagesEl.innerHTML = `<div class="empty-list-note">${escapeHtml(err.message)}</div>`;
      }

      connectSocket(id);
    }

    function connectSocket(id) {
      if (socket) socket.close();
      const wsBase = API_BASE.replace(/^http/, 'ws');
      socket = new WebSocket(`${wsBase}/api/conversations/${id}/ws?token=${encodeURIComponent(token)}`);

      socket.addEventListener('message', (evt) => {
        const data = JSON.parse(evt.data);
        if (data.type !== 'message') return;

        const convo = conversations.find(c => c.id === id);
        if (convo) {
          convo.lastMessage = { content: data.content, mine: data.senderId === me.id };
        }

        if (id === activeConvoId) {
          appendMessageEl({ sender: data.senderId === me.id ? 'me' : data.senderName, text: data.content });
        }
        renderSidebar();
      });
    }

    function appendMessageEl(m) {
      const div = document.createElement('div');
      div.className = 'msg ' + (m.sender === 'me' ? 'msg-me' : 'msg-them');
      div.innerHTML = (m.sender === 'me' ? '' : `<div class="msg-sender">${escapeHtml(m.sender)}</div>`) +
        escapeHtml(m.text);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || !activeConvoId || !socket || socket.readyState !== WebSocket.OPEN) return;
      socket.send(JSON.stringify({ type: 'message', content: text }));
      messageInput.value = '';
    }

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

    // ---------- Modals ----------

    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    document.getElementById('addFriendBtn').addEventListener('click', () => openModal('addFriendModal'));

    document.getElementById('newGroupBtn').addEventListener('click', () => {
      const list = document.getElementById('groupChecklist');
      list.innerHTML = '';
      if (friends.length === 0) {
        list.innerHTML = '<div class="empty-list-note">Add some friends first.</div>';
      }
      friends.forEach(f => {
        const row = document.createElement('label');
        row.className = 'modal-check-row';
        row.innerHTML = `
          <input type="checkbox" class="check-input" value="${f.id}">
          <span class="check-box"></span>
          <span class="check-name">${escapeHtml(f.username)}</span>`;
        list.appendChild(row);
      });
      openModal('newGroupModal');
    });

    document.querySelectorAll('[data-close]').forEach(btn => {
      btn.addEventListener('click', () => closeModal(btn.dataset.close));
    });

    document.getElementById('sendRequestBtn').addEventListener('click', async () => {
      const input = document.getElementById('friendCodeInput');
      const username = input.value.trim();
      if (!username) return;
      try {
        await api('/api/friends/request', { method: 'POST', body: JSON.stringify({ username }) });
        input.value = '';
        closeModal('addFriendModal');
      } catch (err) {
        alert(err.message);
      }
    });

    document.getElementById('createGroupBtn').addEventListener('click', async () => {
      const name = document.getElementById('groupNameInput').value.trim();
      const checked = Array.from(document.querySelectorAll('#groupChecklist input:checked')).map(c => c.value);
      if (!name || checked.length === 0) return;

      try {
        const data = await api('/api/conversations/group', {
          method: 'POST',
          body: JSON.stringify({ name, memberIds: checked })
        });
        document.getElementById('groupNameInput').value = '';
        closeModal('newGroupModal');
        await loadEverything();
        openConversation(data.id);
      } catch (err) {
        alert(err.message);
      }
    });

    // ---------- Boot ----------

    async function init() {
      if (!token) { showAuth(); return; }
      try {
        const data = await api('/api/me');
        me = data.user;
        showChat();
        await loadEverything();
      } catch {
        token = null;
        localStorage.removeItem(TOKEN_KEY);
        showAuth();
      }
    }

    init();
  </script>
</body>
</html>
