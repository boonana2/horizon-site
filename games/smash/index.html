<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horizon: Summit Smash</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="topnav">
    <a href="../../index.html" class="nav-brand">🌅 Horizon</a>
    <span class="nav-title">Summit Smash</span>
  </nav>

  <main>
    <div class="arena-wrap">
      <canvas id="game" width="900" height="500"></canvas>

      <div id="menu" class="overlay">
        <h1>Summit Smash</h1>
        <p>Knock your opponent off the platform.</p>
        <div class="menu-buttons">
          <button id="mode-2p">2 Player</button>
          <button id="mode-cpu">Vs CPU</button>
        </div>
        <div class="controls-info">
          <div>
            <strong>Player 1</strong>
            <span>A / D move · W jump · F attack</span>
          </div>
          <div>
            <strong>Player 2</strong>
            <span>&larr; / &rarr; move · &uarr; jump · / attack</span>
          </div>
        </div>
      </div>

      <div id="winner" class="overlay hidden">
        <h1 id="winner-text">Player 1 Wins!</h1>
        <button id="rematch">Play Again</button>
      </div>
    </div>
  </main>

  <script src="game.js"></script>
</body>
</html>
